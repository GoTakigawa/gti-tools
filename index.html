<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Calculation Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="card w-full max-w-md p-8">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">数値計算テスト</h1>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">数値 A</label>
                <input type="number" id="numA" value="100" 
                    class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">数値 B</label>
                <input type="number" id="numB" value="50" 
                    class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500 outline-none">
            </div>

            <button onclick="calculate()" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-md transition duration-200">
                計算を実行
            </button>

            <div class="mt-6 p-4 bg-blue-50 rounded-lg">
                <p class="text-sm text-blue-600 font-semibold">計算結果 (A + B):</p>
                <p id="result" class="text-3xl font-bold text-blue-900">--</p>
            </div>
        </div>

        <p class="mt-6 text-xs text-center text-gray-400">
            GitHub Pages Deployment Test
        </p>
    </div>

    <script>
        function calculate() {
            const a = parseFloat(document.getElementById('numA').value) || 0;
            const b = parseFloat(document.getElementById('numB').value) || 0;
            const sum = a + b;
            
            // 結果を画面に反映
            document.getElementById('result').innerText = sum.toLocaleString();
            
            // ログにも出力（F12で確認可能）
            console.log("Calculation performed: ", sum);
        }
    </script>
</body>
</html>
